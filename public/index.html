<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DadTon Bot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-user-select: none; }
        body { background: #0A1128; color: #fff; overflow-x: hidden; font-size: 13px; }
        #app { width: 100%; max-width: 390px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 55px; }
        
        header { background: rgba(30, 58, 138, 0.4); backdrop-filter: blur(10px); padding: 8px 12px; border-bottom: 1px solid rgba(59, 130, 246, 0.3); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-weight: 700; font-size: 15px; background: linear-gradient(135deg, #3B82F6 0%, #fff 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .balance-box { background: rgba(10, 17, 40, 0.6); padding: 4px 10px; border-radius: 12px; border: 1px solid #3B82F6; font-weight: 600; color: #3B82F6; }
        
        nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 390px; background: rgba(30, 58, 138, 0.8); backdrop-filter: blur(12px); border-top: 1px solid rgba(59, 130, 246, 0.3); display: flex; padding: 4px 0; z-index: 1000; }
        .nav-item { background: none; border: none; color: #8a9bb4; font-size: 11px; display: flex; flex-direction: column; align-items: center; flex: 1; cursor: pointer; }
        .nav-item.active { color: #3B82F6; font-weight: 600; }
        
        .view-section { display: none; padding: 8px; flex-direction: column; gap: 8px; }
        .view-section.active { display: flex; }
        .card { background: rgba(30, 58, 138, 0.2); border-radius: 12px; border: 1px solid rgba(59, 130, 246, 0.2); padding: 10px; backdrop-filter: blur(6px); }
        .title { font-size: 13px; font-weight: 700; margin-bottom: 6px; text-transform: uppercase; color: #8a9bb4; }
        
        button { background: linear-gradient(135deg, #1E3A8A 0%, #3B82F6 100%); color: #fff; border: none; padding: 8px 14px; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 12px; width: 100%; }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        button.danger { background: #ef4444; }
        button.success { background: #10b981; }
        button.secondary { background: #1e293b; border: 1px solid rgba(255,255,255,0.1); }
        
        input, select { background: #0A1128; border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 6px; padding: 6px 10px; color: #fff; font-size: 12px; width: 100%; outline: none; }
        
        .rocket-display { height: 120px; background: #050b18; position: relative; border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid rgba(59, 130, 246, 0.2); }
        .rocket-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        .rocket-mult { font-size: 34px; font-weight: 700; color: #3B82F6; z-index: 10; text-shadow: 0 0 10px rgba(59,130,246,0.5); }
        
        .mines-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 5px 0; }
        .mine-cell { aspect-ratio: 1; background: rgba(30, 58, 138, 0.3); border: 1px solid rgba(59, 130, 246, 0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; transition: all 0.2s; }
        .mine-cell.safe { background: rgba(16, 185, 129, 0.2); border-color: #10b981; color: #10b981; }
        .mine-cell.mine { background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #ef4444; }
        
        .roulette-track { position: relative; height: 40px; background: #050b18; border-radius: 8px; border: 1px solid rgba(59, 130, 246, 0.2); overflow: hidden; margin: 5px 0; }
        .roulette-line { position: absolute; top: 0; left: 50%; width: 2px; height: 100%; background: #ef4444; z-index: 20; }
        .roulette-ribbon { display: flex; position: absolute; top: 0; left: 0; height: 100%; }
        .roulette-slot { width: 40px; height: 100%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 11px; }
        
        .dense-table { width: 100%; border-collapse: collapse; font-size: 11px; }
        .dense-table th { color: #8a9bb4; text-align: left; padding: 4px; border-bottom: 1px solid rgba(59, 130, 246, 0.2); }
        .dense-table td { padding: 4px; border-bottom: 1px solid rgba(59, 130, 246, 0.1); }
        
        .tab-menu { display: flex; gap: 4px; background: rgba(0,0,0,0.2); padding: 2px; border-radius: 8px; }
        .tab-btn { background: none; color: #8a9bb4; padding: 6px; font-size: 11px; flex: 1; }
        .tab-btn.active { background: #1E3A8A; color: #fff; font-weight: 600; border-radius: 6px; }
        .flex-row { display: flex; gap: 6px; }
        .flex-child { flex: 1; }
        
        #loader { position: fixed; top:0; left:0; width:100vw; height:100vh; background:#0A1128; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:9999; }
        .spinner { border: 3px solid rgba(59, 130, 246, 0.2); border-top: 3px solid #3B82F6; border-radius: 50%; width: 30px; height: 30px; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="app">
        <header><div class="logo">DADTON GAMES</div><div class="balance-box">⭐ <span id="global-balance">0.00</span></div></header>

        <section id="view-rocket" class="view-section active">
            <div class="rocket-display">
                <video id="rocket-vid" class="rocket-video" src="https://github.com/Ivankdhb/animation-site/raw/972460234f4ae5ebc7366f1476c917e602b08daf/OhB1.gif.mp4" loop muted playsinline></video>
                <div id="rocket-mult" class="rocket-mult">1.00x</div>
                <div id="rocket-status" style="font-size:10px; color:#8a9bb4; z-index:10; font-weight:600;">СТАВКИ ПРИНИМАЮТСЯ</div>
            </div>
            <div class="card">
                <div class="flex-row">
                    <div class="flex-child"><label style="font-size:10px;color:#8a9bb4">Ставка</label><input type="number" id="rocket-bet-input" value="10"></div>
                    <div class="flex-child"><label style="font-size:10px;color:#8a9bb4">Автовывод</label><input type="number" id="rocket-auto-input" value="2.0" step="0.1"></div>
                </div>
                <button id="rocket-bet-btn" style="margin-top:6px;">Сделать ставку</button>
            </div>
            <div class="card" style="max-height: 120px; overflow-y: auto;"><div class="title">Пул Живых Ставок</div><table class="dense-table"><tbody id="rocket-bets-pool"></tbody></table></div>
        </section>

        <section id="view-mines" class="view-section">
            <div class="card"><div class="flex-row">
                <div class="flex-child"><input type="number" id="mines-bet-input" value="10"></div>
                <div class="flex-child"><select id="mines-count-input"><option value="5">5 бомб</option><option value="10">10 бомб</option><option value="15">15 бомб</option><option value="20">20 бомб</option></select></div>
            </div></div>
            <div class="mines-grid" id="mines-grid-board"></div>
            <div class="flex-row"><button id="mines-start-btn" class="success flex-child">Начать игру</button><button id="mines-cashout-btn" class="secondary flex-child" disabled>Забрать</button></div>
        </section>

        <section id="view-roulette" class="view-section">
            <div class="roulette-track"><div class="roulette-line"></div><div class="roulette-ribbon" id="roulette-ribbon"></div></div>
            <div id="roulette-timer-banner" style="text-align:center; color:#3B82F6; font-weight:600; font-size:11px;"></div>
            <div class="card">
                <div class="flex-row">
                    <div class="flex-child"><input type="number" id="roulette-bet-input" value="10"></div>
                    <div class="flex-child"><select id="roulette-color-input"><option value="#3B82F6">🔵 Синий Бокс</option><option value="#ef4444">🔴 Красный Бокс</option><option value="#10b981">🟢 Зеленый Бокс</option></select></div>
                </div>
                <button id="roulette-bet-btn" style="margin-top:6px;">Войти в общий банк</button>
            </div>
            <div class="card" style="max-height: 120px; overflow-y: auto;"><table class="dense-table"><tbody id="roulette-bets-pool"></tbody></table></div>
        </section>

        <section id="view-leaderboard" class="view-section">
            <div class="card"><div class="title">Таблица лидеров (Топ по обороту)</div><table class="dense-table"><thead><tr><th>#</th><th>Игрок</th><th>Оборот</th></tr></thead><tbody id="leaderboard-rows"></tbody></table></div>
        </section>

        <section id="view-profile" class="view-section">
            <div class="card" style="text-align:center; display: flex; flex-direction: column; gap: 4px; padding: 8px;">
                <h3 id="prof-username">Загрузка...</h3><p id="prof-id" style="color:#8a9bb4; font-size:10px;"></p>
                <div id="ton-connect-btn" style="display:flex; justify-content:center; margin: 2px 0;"></div>
                <p id="prof-wallet-status" style="font-weight:600; font-size:11px;"></p>
            </div>
            <div class="tab-menu">
                <button class="tab-btn active" onclick="switchProfileTab('prof-tab-stats')">Статистика</button>
                <button class="tab-btn" onclick="switchProfileTab('prof-tab-finance')">Вывод средств</button>
                <button class="tab-btn" onclick="switchProfileTab('prof-tab-refs')">Рефералы</button>
            </div>
            <div id="prof-tab-stats" class="prof-subtab">
                <div class="card" style="display:grid; grid-template-columns:1fr 1fr; gap:6px; text-align:center; margin-bottom: 6px;">
                    <div style="background:rgba(0,0,0,0.2); padding:4px; border-radius:6px;">Игр: <span id="stat-games">0</span></div>
                    <div style="background:rgba(0,0,0,0.2); padding:4px; border-radius:6px; color:#3B82F6;">Валовый оборот: <span id="stat-turnover">0</span></div>
                </div>
                <div class="card"><div class="title">Крайние игры</div><table class="dense-table"><tbody id="history-games-rows"></tbody></table></div>
            </div>
            <div id="prof-tab-finance" class="prof-subtab" style="display:none;">
                <div class="card" style="display:flex; flex-direction:column; gap:5px;">
                    <input type="number" id="wd-amount" placeholder="Сумма списания баланса"><select id="wd-curr"><option value="TON">TON</option><option value="USDT">USDT (TON Network)</option></select><input type="text" id="wd-address" placeholder="Адрес назначения кошелька"><button onclick="requestWithdrawal()">Подтвердить заявку</button>
                </div>
                <div class="card" style="margin-top:6px;"><table class="dense-table"><tbody id="history-finance-rows"></tbody></table></div>
            </div>
            <div id="prof-tab-refs" class="prof-subtab" style="display:none;">
                <div class="card" style="display:flex; flex-direction:column; gap:6px;"><input type="text" id="ref-link-field" readonly style="color:#3B82F6; text-align:center; font-weight:600;"><button onclick="navigator.clipboard.writeText(document.getElementById('ref-link-field').value); alert('Ссылка скопирована!');">Скопировать реф-ссылку</button></div>
                <div class="card" style="margin-top:6px;"><div class="title">Приглашенные участники</div><table class="dense-table"><tbody id="referrals-rows"></tbody></table></div>
            </div>
        </section>

        <section id="view-admin" class="view-section">
            <div class="card" style="display:flex; flex-direction:column; gap:5px;">
                <input type="text" id="adm-target" placeholder="Target Telegram ID"><input type="number" id="adm-amount" placeholder="Количество монет (Сумма)">
                <div class="flex-row"><button class="success flex-child" onclick="executeAdminAction('add_balance')">+ Начислить</button><button class="danger flex-child" onclick="executeAdminAction('deduct_balance')">- Списать</button></div>
                <div class="flex-row"><button class="secondary flex-child" onclick="executeAdminAction('block')">Заблокировать</button><button class="secondary flex-child" onclick="executeAdminAction('unblock')">Разблокировать</button></div>
                <input type="text" id="adm-msg" placeholder="Текст сообщения для пуш-рассылки"><button onclick="executeAdminAction('broadcast')">Запустить глобальный пуш</button>
                <div class="flex-row"><button class="danger flex-child" onclick="executeAdminAction('suspend_bot')">Глобальная пауза</button><button class="success flex-child" onclick="executeAdminAction('resume_bot')">Возобновить</button></div>
            </div>
            <div class="card"><div class="title">Очередь вывода средств</div><table class="dense-table"><tbody id="adm-withdrawals-rows"></tbody></table></div>
        </section>

        <nav>
            <button class="nav-item active" onclick="switchView('view-rocket', this)"><span>🚀</span>Краш</button>
            <button class="nav-item" onclick="switchView('view-mines', this)"><span>💣</span>Мины</button>
            <button class="nav-item" onclick="switchView('view-roulette', this)"><span>🎰</span>Рулетка</button>
            <button class="nav-item" onclick="switchView('view-leaderboard', this); loadLeaderboard();"><span>🏆</span>Топ</button>
            <button class="nav-item" onclick="switchView('view-profile', this); loadProfile();"><span>👤</span>Профиль</button>
            <button class="nav-item" id="nav-admin-btn" style="display:none;" onclick="switchView('view-admin', this); loadAdminDashboard();"><span>👑</span>Админ</button>
        </nav>
    </div>

    <script>
        const tg = window.Telegram.WebApp; tg.expand();
        let userTgId = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "1631627984";
        let userUsername = tg.initDataUnsafe?.user?.username || "AdminTest";
        let userBalance = 0; const socket = io();

        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: 'https://dadton-full.onrender.com/tonconnect-manifest.json', buttonRootId: 'ton-connect-btn' });
        tonConnectUI.onStatusChange(w => {
            if (w) { fetch('/api/user/wallet', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ telegram_id: userTgId, wallet: w.account.address }) }); document.getElementById('prof-wallet-status').innerText = "💎 Кошелек подключен успешно"; }
        });

        fetch('/api/user/sync', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ telegram_id: userTgId, username: userUsername, referrer_id: tg.initDataUnsafe?.start_param }) })
        .then(res => res.json()).then(data => {
            if (data.error) { alert("Ваш аккаунт заблокирован или система на тех. обслуживании."); return; }
            userBalance = data.balance; document.getElementById('global-balance').innerText = userBalance.toFixed(2);
            document.getElementById('loader').style.display = 'none';
            if (userTgId === "1631627984") document.getElementById('nav-admin-btn').style.display = 'flex';
        });

        function switchView(id, btn) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active'); if(btn) btn.classList.add('active');
        }
        function switchProfileTab(id) {
            document.querySelectorAll('.prof-subtab').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).style.display = 'block'; event.target.classList.add('active');
        }

        // КРАШ ИГРА
        let rBtn = document.getElementById('rocket-bet-btn');
        rBtn.onclick = () => socket.emit('rocket_bet', { telegram_id: userTgId, username: userUsername, bet: parseFloat(document.getElementById('rocket-bet-input').value), autoWithdraw: parseFloat(document.getElementById('rocket-auto-input').value) });
        socket.on('rocket_state', s => {
            let m = document.getElementById('rocket-mult'), st = document.getElementById('rocket-status'), v = document.getElementById('rocket-vid');
            if (s.status === 'waiting') { m.innerText = "⏳ " + s.timer + "с"; st.innerText = "ОЖИДАНИЕ СТАВОК"; rBtn.disabled = false; if(v.paused) v.play().catch(()=>{}); }
            else if (s.status === 'live') { m.innerText = s.multiplier.toFixed(2) + "x"; st.innerText = "РАКЕТА В ПУТИ"; rBtn.disabled = true; }
            else { m.innerText = "💥 ВЗРЫВ " + s.crashPoint + "x"; st.innerText = "РАКЕТА СГОРЕЛА"; rBtn.disabled = true; v.pause(); }
            let bPool = document.getElementById('rocket-bets-pool'); bPool.innerHTML = "";
            s.bets.forEach(b => { bPool.innerHTML += `<tr><td>${b.username}</td><td>${b.bet}⭐</td><td>${b.cashedOut?'✅ Забрал':'🔥 Игре'}</td></tr>`; });
        });

        // МИНЫ ИГРА
        let mCells = [], mActive = false;
        function buildMines() {
            let bd = document.getElementById('mines-grid-board'); bd.innerHTML = "";
            for(let i=0; i<25; i++) {
                let c = document.createElement('div'); c.className = "mine-cell";
                c.onclick = () => { if(!mActive || mCells.includes(i)) return; mCells.push(i); c.className="mine-cell safe"; c.innerText="💎"; document.getElementById('mines-cashout-btn').disabled=false; };
                bd.appendChild(c);
            }
        }
        buildMines();
        document.getElementById('mines-start-btn').onclick = () => { mCells = []; mActive = true; buildMines(); document.getElementById('mines-start-btn').disabled=true; };
        document.getElementById('mines-cashout-btn').onclick = () => {
            fetch('/api/games/mines/play', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ telegram_id: userTgId, bet: parseFloat(document.getElementById('mines-bet-input').value), minesCount: parseInt(document.getElementById('mines-count-input').value), selectedCells: mCells }) })
            .then(res => res.json()).then(d => {
                mActive = false; document.getElementById('mines-start-btn').disabled = false; document.getElementById('mines-cashout-btn').disabled = true;
                userBalance = d.balance; document.getElementById('global-balance').innerText = userBalance.toFixed(2);
                let el = document.querySelectorAll('.mine-cell');
                d.minesGrid.forEach((v, i) => { if(v===1) { el[i].className="mine-cell mine"; el[i].innerText="💣"; } else if(!mCells.includes(i)) { el[i].innerText="💎"; } });
                alert(d.hitMine ? "Подорвался на мине!" : `Успешный вывод! Выиграно x${d.finalMultiplier.toFixed(2)}`);
            });
        };

        // РУЛЕТКА ИГРА
        function buildRoll() {
            let rb = document.getElementById('roulette-ribbon'); rb.innerHTML = "";
            let clr = ['#3B82F6', '#ef4444', '#10b981'];
            for(let i=0; i<60; i++) { let s = document.createElement('div'); s.className="roulette-slot"; s.style.backgroundColor=clr[i%3]; s.innerText="BOX"; rb.appendChild(s); }
        }
        buildRoll();
        document.getElementById('roulette-bet-btn').onclick = () => socket.emit('roulette_bet', { telegram_id: userTgId, username: userUsername, bet: parseFloat(document.getElementById('roulette-bet-input').value), color: document.getElementById('roulette-color-input').value });
        socket.on('roulette_state', s => {
            document.getElementById('roulette-timer-banner').innerText = s.status==='waiting' ? `Осталось до прокрутки кейса: ${s.timer} сек` : "ЛЕНТА КРУТИТСЯ...";
            if(s.status==='waiting') { document.getElementById('roulette-ribbon').style.transform="translateX(0px)"; document.getElementById('roulette-ribbon').style.transition="none"; }
            let p = document.getElementById('roulette-bets-pool'); p.innerHTML = "";
            s.bets.forEach(b => { p.innerHTML += `<tr><td>${b.username}</td><td style="color:${b.color};">■ Предмет</td><td>${b.bet}⭐</td></tr>`; });
        });
        socket.on('roulette_result', r => {
            let rb = document.getElementById('roulette-ribbon'); rb.style.transition="transform 3s cubic-bezier(0.1, 1, 0.1, 1)"; rb.style.transform="translateX(-1200px)";
            setTimeout(() => { alert(`Победитель раунда: ${r.winner.username}! Весь банк забрал: ${r.total}⭐`); if(userTgId===r.winner.telegram_id) { userBalance+=r.total; document.getElementById('global-balance').innerText=userBalance.toFixed(2); } }, 3200);
        });

        // ПРОФИЛЬ, ТОП И РЕФЕРАЛЫ
        function loadProfile() {
            document.getElementById('prof-username').innerText = userUsername; document.getElementById('prof-id').innerText = "Ваш ID: " + userTgId;
            document.getElementById('ref-link-field').value = "https://t.me/dadtonbot?start=" + userTgId;
            fetch(`/api/user/${userTgId}/profile`).then(res => res.json()).then(d => {
                document.getElementById('stat-games').innerText = d.user.games_count; document.getElementById('stat-turnover').innerText = d.user.turnover.toFixed(1);
                let gh = document.getElementById('history-games-rows'); gh.innerHTML = "";
                d.games.forEach(g => { gh.innerHTML += `<tr><td>${g.game_type}</td><td>x${g.multiplier.toFixed(2)}</td><td style="color:${g.profit>=0?'#10b981':'#ef4444'}">${g.profit.toFixed(1)}⭐</td></tr>`; });
                let fh = document.getElementById('history-finance-rows'); fh.innerHTML = "";
                d.finances.forEach(f => { fh.innerHTML += `<tr><td>ВЫВОД</td><td>${f.amount}⭐</td><td>${f.status}</td></tr>`; });
                let rf = document.getElementById('referrals-rows'); rf.innerHTML = "";
                d.referrals.forEach(r => { rf.innerHTML += `<tr><td>${r.username}</td><td>ID: ${r.telegram_id}</td></tr>`; });
            });
        }
        function requestWithdrawal() {
            fetch('/api/user/withdraw', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ telegram_id: userTgId, amount: parseFloat(document.getElementById('wd-amount').value), currency: document.getElementById('wd-curr').value, address: document.getElementById('wd-address').value }) })
            .then(() => { alert("Заявка успешно сформирована!"); loadProfile(); });
        }
        function loadLeaderboard() {
            fetch('/api/leaderboard').then(res => res.json()).then(d => {
                let r = document.getElementById('leaderboard-rows'); r.innerHTML = "";
                d.forEach((w, i) => { r.innerHTML += `<tr><td>${i+1}</td><td>${w.username}</td><td>${w.turnover.toFixed(1)}⭐</td></tr>`; });
            });
        }

        // АДМИН-ФУНКЦИИ
        function loadAdminDashboard() {
            fetch('/api/admin/action', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ admin_id: userTgId, action: 'get_withdrawals' }) })
            .then(res => res.json()).then(d => {
                let r = document.getElementById('adm-withdrawals-rows'); r.innerHTML = "";
                d.forEach(w => { r.innerHTML += `<tr><td>ID: ${w.telegram_id}</td><td>${w.amount}⭐ (${w.currency})</td><td><button onclick="apprWd(${w.id})">Провести выплату</button></td></tr>`; });
            });
        }
        function apprWd(id) { fetch('/api/admin/action', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ admin_id: userTgId, action: 'approve_withdrawal', target_id: id }) }).then(() => loadAdminDashboard()); }
        function executeAdminAction(act) {
            fetch('/api/admin/action', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ admin_id: userTgId, action: act, target_id: document.getElementById('adm-target').value, amount: parseFloat(document.getElementById('adm-amount').value), message: document.getElementById('adm-msg').value }) })
            .then(() => alert("Действие выполнено на сервере"));
        }
        socket.on('broadcast_message', d => alert("📢 СИСТЕМНОЕ УВЕДОМЛЕНИЕ ОТ АДМИНИСТРАЦИИ:\n\n" + d.text));
    </script>
</body>
</html>
