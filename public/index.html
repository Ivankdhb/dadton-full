<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DadTon Casino</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #060606;
            color: #E5E5E5;
            overflow-x: hidden;
        }
        /* Золотой градиент для текста и премиальных кнопок */
        .gold-text {
            background: linear-gradient(135deg, #FFE066 0%, #F5C400 50%, #B59410 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gold-bg {
            background: linear-gradient(135deg, #FFD700 0%, #D4AF37 50%, #AA7C11 100%);
        }
        .gold-border {
            border-image: linear-gradient(135deg, #FFD700, #B59410) 1;
        }
        /* Стеклянный премиум стиль для карт */
        .premium-card {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 215, 0, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }
        /* Кастомный скроллбар */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #D4AF37;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4 bottom-0">

    <header class="premium-card rounded-2xl p-4 mb-6 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="w-12 h-12 rounded-full border-2 border-[#FFD700] flex items-center justify-center bg-[#111]">
                <i class="fa-solid fa-crown text-[#FFD700] text-xl"></i>
            </div>
            <div>
                <h2 id="userName" class="font-bold text-sm">GUEST_PLAYER</h2>
                <span class="text-xs text-amber-500 font-semibold"><i class="fa-solid fa-gem"></i> VIP Статус</span>
            </div>
        </div>
        <div class="text-right">
            <p class="text-xs text-gray-400 uppercase tracking-wider">Баланс</p>
            <p class="text-xl font-extrabold text-[#FFD700]" id="balanceDisplay">0 ⭐</p>
        </div>
    </header>

    <div class="mb-6 flex justify-center">
        <div id="ton-connect-btn-container" class="w-full max-w-xs"></div>
    </div>

    <nav class="flex gap-2 mb-6 overflow-x-auto pb-2">
        <button onclick="switchTab('rocket')" class="tab-btn px-4 py-2 rounded-xl text-xs font-bold uppercase border border-[#FFD700]/30 bg-[#111] text-white active:bg-[#FFD700] active:text-black transition">🚀 Ракета</button>
        <button onclick="switchTab('mines')" class="tab-btn px-4 py-2 rounded-xl text-xs font-bold uppercase border border-[#FFD700]/30 bg-[#111] text-white active:bg-[#FFD700] active:text-black transition">💣 Мины</button>
        <button onclick="switchTab('roulette')" class="tab-btn px-4 py-2 rounded-xl text-xs font-bold uppercase border border-[#FFD700]/30 bg-[#111] text-white active:bg-[#FFD700] active:text-black transition">🎡 Рулетка</button>
        <button onclick="switchTab('poker')" class="tab-btn px-4 py-2 rounded-xl text-xs font-bold uppercase border border-[#FFD700]/30 bg-[#111] text-white active:bg-[#FFD700] active:text-black transition">🃏 Покер</button>
    </nav>

    <main>
        <section id="game-rocket" class="game-section premium-card rounded-2xl p-4">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold gold-text uppercase">🚀 Crash Rocket</h3>
                <span id="rocket-status" class="text-xs bg-zinc-800 text-amber-400 px-3 py-1 rounded-full font-bold">ОЖИДАНИЕ</span>
            </div>
            <div class="h-48 bg-black rounded-xl relative overflow-hidden flex flex-col justify-center items-center border border-zinc-800 mb-4">
                <div id="rocket-multiplier" class="text-4xl font-extrabold text-white z-10">1.00x</div>
                <div id="rocket-canvas-info" class="text-xs text-zinc-500 mt-2 z-10">До взлета: 10с</div>
                <i id="rocket-icon" class="fa-solid fa-shuttle-space text-4xl text-[#FFD700] absolute bottom-4 left-4 transition-all duration-300 transform rotate-45"></i>
            </div>
            <div class="flex gap-2">
                <input id="rocket-bet" type="number" value="10" class="w-1/2 bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-white font-bold text-center focus:outline-none focus:border-[#FFD700]">
                <button onclick="placeRocketBet()" id="rocket-btn" class="w-1/2 gold-bg text-black font-extrabold rounded-xl uppercase tracking-wider text-sm shadow-lg shadow-[#FFD700]/20 active:scale-95 transition">Поставить</button>
            </div>
        </section>

        <section id="game-mines" class="game-section premium-card rounded-2xl p-4 hidden">
            <h3 class="text-lg font-bold gold-text uppercase mb-4">💣 Блатные Мины</h3>
            <div class="grid grid-cols-5 gap-2 mb-4" id="mines-grid">
                </div>
            <div class="flex flex-col gap-3">
                <div class="flex gap-2">
                    <div class="w-1/2">
                        <label class="text-[10px] uppercase text-zinc-400">Ставка (⭐)</label>
                        <input id="mines-bet" type="number" value="10" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-2 text-white font-bold text-center">
                    </div>
                    <div class="w-1/2">
                        <label class="text-[10px] uppercase text-zinc-400">Мины</label>
                        <select id="mines-count" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-2 text-white font-bold text-center">
                            <option value="5">5 мин</option>
                            <option value="10">10 мин</option>
                            <option value="15">15 мин</option>
                            <option value="20">20 мин</option>
                        </select>
                    </div>
                </div>
                <button onclick="startMinesGame()" id="mines-action-btn" class="w-full gold-bg text-black font-extrabold py-3 rounded-xl uppercase text-sm shadow-lg active:scale-95 transition">Начать Игру</button>
            </div>
        </section>

        <section id="game-roulette" class="game-section premium-card rounded-2xl p-4 hidden">
            <h3 class="text-lg font-bold gold-text uppercase mb-2">🎡 Элитная Рулетка</h3>
            <p class="text-xs text-zinc-400 mb-4 text-center">Мультиплеерная комната. Общий банк.</p>
            
            <div class="flex justify-center mb-6 relative">
                <div class="w-40 h-40 rounded-full border-4 border-[#FFD700] flex items-center justify-center bg-zinc-900 shadow-xl shadow-[#FFD700]/10" id="wheel">
                    <div class="w-2 h-10 bg-[#FFD700] absolute top-0 origin-bottom transform" id="wheel-pointer"></div>
                    <div class="text-center">
                        <span id="roulette-timer" class="text-2xl font-black block text-white">15</span>
                        <span class="text-[9px] text-zinc-500 uppercase tracking-widest">до старта</span>
                    </div>
                </div>
            </div>

            <div class="flex gap-2">
                <input id="roulette-bet" type="number" value="50" class="w-1/2 bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-white font-bold text-center">
                <button onclick="placeRouletteBet()" class="w-1/2 gold-bg text-black font-extrabold rounded-xl uppercase text-xs active:scale-95 transition">Влететь в банк</button>
            </div>
        </section>

        <section id="game-poker" class="game-section premium-card rounded-2xl p-4 hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold gold-text uppercase">🃏 VIP Poker Room</h3>
                <span class="text-xs bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded border border-emerald-500/40 font-bold">Texas Holdem</span>
            </div>
            
            <div class="bg-gradient-to-b from-emerald-900 to-zinc-900 border-4 border-amber-700 h-56 rounded-3xl relative p-3 flex flex-col justify-between shadow-2xl">
                <div class="flex justify-center gap-1 mt-8" id="poker-table-cards">
                    <div class="w-8 h-12 bg-white rounded border border-zinc-400 flex items-center justify-center text-black font-bold text-xs">🂡</div>
                    <div class="w-8 h-12 bg-white rounded border border-zinc-400 flex items-center justify-center text-black font-bold text-xs">🂮</div>
                    <div class="w-8 h-12 bg-white rounded border border-zinc-400 flex items-center justify-center text-black font-bold text-xs">🂫</div>
                </div>
                <div class="absolute top-2 left-1/2 transform -translate-x-1/2 bg-black/60 px-3 py-1 rounded-full text-xs font-bold text-[#FFD700]">Pot: <span id="poker-pot">0</span> ⭐</div>
                
                <div class="flex justify-center gap-2">
                    <div class="w-10 h-14 bg-zinc-100 rounded-lg text-black font-bold flex items-center justify-center text-sm shadow-md">♥️A</div>
                    <div class="w-10 h-14 bg-zinc-100 rounded-lg text-black font-bold flex items-center justify-center text-sm shadow-md">♦️K</div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-2 mt-4">
                <button onclick="pokerAction('fold')" class="bg-red-900/40 text-red-400 border border-red-800 rounded-xl py-2 font-bold uppercase text-xs active:scale-95 transition">Пас</button>
                <button onclick="pokerAction('check')" class="bg-zinc-800 text-white rounded-xl py-2 font-bold uppercase text-xs active:scale-95 transition">Чек</button>
                <button onclick="pokerAction('raise')" class="gold-bg text-black rounded-xl py-2 font-extrabold uppercase text-xs active:scale-95 transition">Рейз +50</button>
            </div>
        </section>
    </main>

    <script>
        const tg = window.Telegram?.WebApp;
        if(tg) {
            tg.expand();
            document.getElementById('userName').innerText = tg.initDataUnsafe?.user?.username || tg.initDataUnsafe?.user?.first_name || "DADDY_PLAYER";
        }

        // Инициализация TON Connect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://dadton-full.onrender.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn-container'
        });

        // Работа со стейтом приложения
        let balance = 1000;
        let ws;
        let currentMinesState = { active: false, mines: [], opened: 0, bet: 0 };

        function updateBalanceUI() {
            document.getElementById('balanceDisplay').innerText = `${balance} ⭐`;
        }
        updateBalanceUI();

        function switchTab(tabId) {
            document.querySelectorAll('.game-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(`game-${tabId}`).classList.remove('hidden');
        }

        // --- ЛОГИКА ИГРЫ: МИНЫ ---
        function generateMinesGrid() {
            const grid = document.getElementById('mines-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 25; i++) {
                const btn = document.createElement('button');
                btn.dataset.id = i;
                btn.className = "aspect-square bg-zinc-900 border border-zinc-800 rounded-xl flex items-center justify-center text-xl font-bold text-transparent hover:border-[#FFD700]/50 transition duration-150";
                btn.innerText = "⭐";
                btn.onclick = () => revealMine(i, btn);
                grid.appendChild(btn);
            }
        }
        generateMinesGrid();

        function startMinesGame() {
            const bet = parseInt(document.getElementById('mines-bet').value);
            const count = parseInt(document.getElementById('mines-count').value);
            if (balance < bet) return alert("Недостаточно средств!");

            balance -= bet;
            updateBalanceUI();

            currentMinesState = {
                active: true,
                bet: bet,
                count: count,
                opened: 0,
                mines: Array.from({length: 25}, (_, i) => i).sort(() => 0.5 - Math.random()).slice(0, count)
            };

            generateMinesGrid();
            document.getElementById('mines-action-btn').innerText = "Забрать выигрыш (Кэшаут)";
            document.getElementById('mines-action-btn').className = "w-full bg-emerald-600 text-white font-extrabold py-3 rounded-xl uppercase text-sm shadow-lg transition";
            document.getElementById('mines-action-btn').onclick = cashoutMines;
        }

        function revealMine(idx, element) {
            if (!currentMinesState.active) return;
            
            if (currentMinesState.mines.includes(idx)) {
                // ВЗРЫВ
                element.className = "aspect-square bg-red-600 text-white rounded-xl flex items-center justify-center text-xl font-bold scale-95 transition duration-150";
                element.innerHTML = "<i class='fa-solid fa-bomb'></i>";
                alert("БАБАХ! Вы подорвались на мине.");
                resetMinesUI();
            } else {
                // Безопасно
                element.className = "aspect-square bg-gradient-to-br from-amber-400 to-amber-600 text-black rounded-xl flex items-center justify-center text-xl font-bold shadow-lg shadow-amber-500/20";
                element.innerHTML = "<i class='fa-solid fa-gem'></i>";
                currentMinesState.opened++;
                
                let currentMultiplier = Math.pow(1.15, currentMinesState.opened);
                let currentWin = Math.floor(currentMinesState.bet * currentMultiplier);
                document.getElementById('mines-action-btn').innerText = `Забрать ${currentWin} ⭐`;
            }
        }

        function cashoutMines() {
            if (!currentMinesState.active || currentMinesState.opened === 0) return;
            let currentMultiplier = Math.pow(1.15, currentMinesState.opened);
            let winAmount = Math.floor(currentMinesState.bet * currentMultiplier);
            balance += winAmount;
            updateBalanceUI();
            alert(`Премиальный выигрыш: +${winAmount} ⭐`);
            resetMinesUI();
        }

        function resetMinesUI() {
            currentMinesState.active = false;
            document.getElementById('mines-action-btn').innerText = "Начать Игру";
            document.getElementById('mines-action-btn').className = "w-full gold-bg text-black font-extrabold py-3 rounded-xl uppercase text-sm shadow-lg transition";
            document.getElementById('mines-action-btn').onclick = startMinesGame;
        }

        // --- ПОДКЛЮЧЕНИЕ К WEBSOCKET ДЛЯ СИНХРОННЫХ ИГР ---
        function initWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // Обработка Краш-Ракеты
                if (data.type === 'rocket_tick') {
                    document.getElementById('rocket-status').innerText = "ОЖИДАНИЕ";
                    document.getElementById('rocket-canvas-info').innerText = `До взлета: ${data.time}с`;
                    document.getElementById('rocket-multiplier').innerText = "1.00x";
                }
                if (data.type === 'rocket_fly') {
                    document.getElementById('rocket-status').innerText = "В ПОЛЕТЕ";
                    document.getElementById('rocket-multiplier').innerText = `${data.mult.toFixed(2)}x`;
                    document.getElementById('rocket-canvas-info').innerText = `Ракета летит высоко!`;
                    // Сдвиг иконки ракеты вверх-вправо по мере роста множителя
                    let offset = Math.min(60, data.mult * 5);
                    document.getElementById('rocket-icon').style.bottom = `${4 + offset}%`;
                    document.getElementById('rocket-icon').style.left = `${4 + offset}%`;
                }
                if (data.type === 'rocket_crash') {
                    document.getElementById('rocket-status').innerText = "ВЗОРВАЛАСЬ";
                    document.getElementById('rocket-multiplier').className = "text-4xl font-extrabold text-red-500 z-10 animate-ping";
                    document.getElementById('rocket-multiplier').innerText = `CRASH @ ${data.mult.toFixed(2)}x`;
                    setTimeout(() => {
                        document.getElementById('rocket-multiplier').className = "text-4xl font-extrabold text-white z-10";
                    }, 2000);
                }
            };
        }
        
        // Запускаем сокеты после загрузки
        window.onload = () => {
            initWebSocket();
        }
    </script>
</body>
</html>
