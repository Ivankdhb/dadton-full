<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>DadTon - TON Connect</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #111111;
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        .logo { font-size: 64px; margin-bottom: 16px; }
        h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
        }
        .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; }
        #ton-connect-button {
            margin: 20px 0;
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
        }
        .status-connected { color: #00cc66; }
        .status-error { color: #ff4444; }
        .wallet-address {
            font-family: monospace;
            font-size: 12px;
            color: #FFD700;
            word-break: break-all;
            margin-top: 8px;
        }
        hr { border-color: #2a2a2a; margin: 20px 0; }
        .info-text { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎲</div>
        <h1>DadTon</h1>
        <div class="subtitle">Подключите TON кошелёк</div>
        
        <div id="ton-connect-button"></div>
        
        <div id="auth-status" class="status">
            ⚪ Статус: Ожидание подключения
        </div>
        
        <hr>
        <div class="info-text">
            🔒 Безопасное подключение через TON Connect<br>
            📱 Поддерживаются Tonkeeper, MyTonWallet, Wallet в Telegram
        </div>
    </div>

    <script>
        // 1. Инициализация TonConnect UI
        // ВАЖНО: замени URL на свой реальный домен после деплоя!
        const manifestUrl = window.location.origin + '/tonconnect-manifest.json';
        
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: manifestUrl,
            buttonRootId: 'ton-connect-button'
        });

        const statusDiv = document.getElementById('auth-status');

        // 2. Генерация Proof (запроса на авторизацию) для сервера
        async function setupProof() {
            try {
                const response = await fetch('/api/generate-payload');
                const data = await response.json();
                
                if (data.payload) {
                    tonConnectUI.setConnectRequestParameters({
                        state: 'ready',
                        value: { tonProof: data.payload }
                    });
                } else {
                    console.error('Нет payload в ответе');
                }
            } catch (error) {
                console.error('Ошибка при генерации payload:', error);
                statusDiv.innerHTML = '⚠️ Ошибка подключения к серверу';
            }
        }

        // 3. Отслеживание состояния кошелька
        tonConnectUI.onStatusChange(async (wallet) => {
            if (wallet && wallet.connectItems?.tonProof) {
                statusDiv.innerHTML = '🟡 Кошелёк подключён. Верификация на сервере...';
                
                try {
                    const verifyResponse = await fetch('/api/verify-proof', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            address: wallet.account.address,
                            network: wallet.account.network,
                            proof: wallet.connectItems.tonProof.proof,
                            publicKey: wallet.account.publicKey
                        })
                    });
                    
                    const verifyData = await verifyResponse.json();
                    
                    if (verifyData.success) {
                        const shortAddress = wallet.account.address.slice(0, 6) + '...' + wallet.account.address.slice(-6);
                        statusDiv.innerHTML = `✅ Авторизован!<br><span class="wallet-address">${shortAddress}</span>`;
                        statusDiv.classList.add('status-connected');
                    } else {
                        statusDiv.innerHTML = `❌ Ошибка верификации: ${verifyData.error || 'Неизвестная ошибка'}`;
                        statusDiv.classList.add('status-error');
                    }
                } catch (error) {
                    console.error('Ошибка при верификации:', error);
                    statusDiv.innerHTML = '❌ Ошибка связи с сервером при верификации';
                    statusDiv.classList.add('status-error');
                }
            } else if (!wallet) {
                statusDiv.innerHTML = '⚪ Статус: Не подключено';
                statusDiv.classList.remove('status-connected', 'status-error');
                // Перезапускаем setupProof для нового подключения
                setupProof();
            }
        });

        // Запускаем подготовку proof при загрузке страницы
        setupProof();
    </script>
</body>
</html>
