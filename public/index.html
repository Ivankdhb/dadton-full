<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>DadTon</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<style>
  :root{
    --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--bg4:#222222;
    --border:#2a2a2a;--border2:#333;
    --gold:#d4af37;--gold2:#f0c84a;--silver:#c0c0c0;--bronze:#cd7f32;
    --red:#e63946;--blue:#457b9d;--green:#2d6a4f;
    --text:#f0f0f0;--text2:#aaa;--text3:#666;
    --accent:#d4af37;
    --radius:12px;--radius-sm:8px;
    font-family:'Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;padding-bottom:70px}
  
  .header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
  .logo{font-size:20px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .header-right{display:flex;align-items:center;gap:10px}
  .btn-connect{background:var(--bg3);border:1px solid var(--border2);color:var(--gold);padding:7px 12px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s}
  .btn-connect:active{background:var(--bg4)}
  .balance-chip{background:var(--bg3);border:1px solid var(--gold);padding:7px 12px;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:5px;font-weight:600;color:var(--gold);transition:all .2s}
  .balance-chip:active{background:var(--bg4)}

  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:200}
  .nav-btn{flex:1;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--text3);font-size:11px;transition:color .2s;border:none;background:transparent}
  .nav-btn.active{color:var(--gold)}
  .nav-btn svg{width:22px;height:22px}

  .page{display:none;padding:16px;min-height:calc(100vh - 120px)}
  .page.active{display:block}

  .game-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
  .game-card:active{background:var(--bg3);transform:scale(.98)}
  .game-card-left{display:flex;flex-direction:column;gap:4px;z-index:1}
  .game-card-title{font-size:18px;font-weight:700;color:var(--gold)}
  .game-card-sub{font-size:12px;color:var(--text2)}
  .game-card-icon{font-size:36px;z-index:1}

  .btn{padding:12px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:14px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:6px}
  .btn:active{transform:scale(.97)}
  .btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;box-shadow:0 4px 12px rgba(212,175,55,.3)}
  .btn-dark{background:var(--bg3);border:1px solid var(--border2);color:var(--gold)}
  .btn-red{background:var(--red);color:#fff}
  .btn-danger{background:#7f1d1d;border:1px solid #991b1b;color:#fca5a5}
  .btn-full{width:100%}
  .btn-sm{padding:8px 14px;font-size:12px}
  .btn:disabled{opacity:0.5;cursor:not-allowed}

  .input{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:14px;width:100%;outline:none;transition:border .2s}
  .input:focus{border-color:var(--gold)}
  .input:disabled{opacity:0.5}

  .section-title{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--gold)}
  .row{display:flex;gap:8px}
  .col{display:flex;flex-direction:column;gap:8px}
  .label{font-size:12px;color:var(--gold);margin-bottom:4px}

  .quick-btns{display:flex;gap:6px;flex-wrap:wrap}
  .qbtn{background:var(--bg3);border:1px solid var(--border2);color:var(--gold);padding:6px 12px;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;transition:all .2s}
  .qbtn:active{background:var(--bg4);color:var(--gold2)}

  .rocket-video-wrap{position:relative;background:var(--bg2);border-radius:var(--radius);overflow:hidden;margin-bottom:12px;height:200px;display:flex;align-items:center;justify-content:center}
  .rocket-video-wrap video{width:100%;height:100%;object-fit:cover;opacity:.6}
  .rocket-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
  .rocket-mult{font-size:48px;font-weight:900;letter-spacing:-2px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;transition:all .3s}
  .rocket-mult.crashed{-webkit-text-fill-color:var(--red);background:none;animation:shake .5s}
  .rocket-timer-bar{width:80%;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;border:1px solid var(--border2)}
  .rocket-timer-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));transition:width 1s linear;border-radius:3px}
  .rocket-status{font-size:13px;color:var(--text2)}

  .crash-history{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
  .crash-badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700}
  .crash-low{background:#1a0a0a;color:var(--red);border:1px solid #3d0e0e}
  .crash-mid{background:#0a1a0a;color:#4ade80;border:1px solid #14532d}
  .crash-high{background:#1a1500;color:var(--gold);border:1px solid #3d2e00}

  .participants-list{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px}
  .participant-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
  .participant-row:last-child{border-bottom:none}
  .p-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;background:var(--bg3)}
  .p-name{font-size:13px;font-weight:600;flex:1;color:var(--text)}
  .p-amount{font-size:12px;color:var(--gold)}
  .p-status{font-size:12px;font-weight:700}
  .p-status.won{color:#4ade80}
  .p-status.waiting{color:var(--text3)}

  .mines-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:16px 0}
  .mine-cell{aspect-ratio:1;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px;cursor:pointer;transition:all .2s;user-select:none}
  .mine-cell:active{transform:scale(.94)}
  .mine-cell.safe{background:#0d2b1a;border-color:#14532d;color:#4ade80;animation:popIn .3s}
  .mine-cell.mine{background:#2b0d0d;border-color:#7f1d1d;color:var(--red);animation:shake .3s}
  .mine-cell.disabled{cursor:default;opacity:.6}
  .mines-mult{text-align:center;font-size:24px;font-weight:800;color:var(--gold);margin:8px 0}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  @keyframes popIn{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}

  .roulette-container{position:relative;width:280px;height:280px;margin:0 auto 16px}
  .roulette-wheel-svg{width:280px;height:280px;transition:transform 4s cubic-bezier(.17,.67,.12,.99);filter:drop-shadow(0 0 20px rgba(212,175,55,.3))}
  .roulette-pointer{position:absolute;top:-15px;left:50%;transform:translateX(-50%);z-index:20;font-size:32px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.8));animation:pointerBounce .5s infinite alternate;color:var(--gold)}
  @keyframes pointerBounce{0%{transform:translateX(-50%) translateY(0)}100%{transform:translateX(-50%) translateY(5px)}}
  .roulette-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;background:var(--bg2);border-radius:50%;border:3px solid var(--gold);z-index:10;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900}
  .roulette-result{text-align:center;font-size:22px;font-weight:800;margin:12px 0;min-height:32px;color:var(--gold)}
  .roulette-result.red{color:var(--red)}
  .roulette-result.blue{color:#60a5fa}
  .roulette-result.green{color:#4ade80}

  .color-bets{display:flex;gap:8px;margin-bottom:12px}
  .color-bet-btn{flex:1;padding:12px;border-radius:var(--radius-sm);border:2px solid transparent;text-align:center;cursor:pointer;font-size:13px;font-weight:700;transition:all .2s}
  .color-bet-btn.red-btn{background:#2b0d0d;border-color:#7f1d1d;color:var(--red)}
  .color-bet-btn.blue-btn{background:#0d1a2b;border-color:#1d4a7f;color:#60a5fa}
  .color-bet-btn.green-btn{background:#0d2b0d;border-color:#1d7f1d;color:#4ade80}
  .color-bet-btn.selected{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.3);transform:scale(1.05)}

  .poker-table{background:radial-gradient(ellipse at center,#0d3d1a 0%,#0a2814 100%);border:3px solid #1a5c2e;border-radius:20px;padding:24px;margin-bottom:16px;text-align:center;box-shadow:inset 0 0 40px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.4);position:relative;overflow:hidden}
  .card-row{display:flex;justify-content:center;gap:10px;margin:12px 0;perspective:1000px}
  .playing-card{width:64px;height:92px;background:linear-gradient(135deg,#fff,#f5f5f5);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;font-weight:900;border:2px solid #ddd;box-shadow:0 4px 12px rgba(0,0,0,.5),inset 0 0 0 1px rgba(255,255,255,.5);transition:all .5s cubic-bezier(.4,0,.2,1);position:relative;transform-style:preserve-3d}
  .playing-card.red-suit{color:var(--red)}
  .playing-card.black-suit{color:#1a1a1a}
  .playing-card.hidden{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border-color:#0f3460;color:#f0f0f0;font-size:28px;box-shadow:0 4px 12px rgba(0,0,0,.6),inset 0 0 20px rgba(15,52,96,.5)}
  .playing-card.hidden::before{content:'🎴';position:absolute;font-size:32px;opacity:.4}
  .playing-card.reveal{animation:revealCard .8s cubic-bezier(.4,0,.2,1)}
  .playing-card.deal{animation:dealCard .5s cubic-bezier(.4,0,.2,1) backwards}
  @keyframes dealCard{0%{transform:translateY(-100px) rotateY(180deg) scale(.5);opacity:0}100%{transform:translateY(0) rotateY(0) scale(1);opacity:1}}
  @keyframes revealCard{0%{transform:rotateY(0)}50%{transform:rotateY(90deg) scale(1.1)}100%{transform:rotateY(0) scale(1)}}
  .card-rank{font-size:20px;line-height:1}
  .card-suit{font-size:24px;line-height:1;margin-top:4px}
  .card-label{font-size:11px;color:var(--gold);margin:8px 0 4px;font-weight:600;text-transform:uppercase;letter-spacing:1px}
  .community-cards{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:12px 0}
  .community-card{width:52px;height:76px;font-size:16px}
  .hand-name{font-size:16px;font-weight:700;color:var(--gold);margin-top:8px;min-height:24px;text-shadow:0 2px 4px rgba(0,0,0,.5)}
  .poker-result{font-size:24px;font-weight:900;text-align:center;padding:16px;border-radius:var(--radius);margin-bottom:12px;animation:fadeInUp .5s}
  .poker-result.win{background:linear-gradient(135deg,#0d2b1a,#14532d);color:#4ade80;border:1px solid #166534}
  .poker-result.lose{background:linear-gradient(135deg,#2b0d0d,#7f1d1d);color:var(--red);border:1px solid #991b1b}
  .poker-result.draw{background:linear-gradient(135deg,#1a1a0d,#3d3d00);color:var(--gold);border:1px solid #5c5c00}
  @keyframes fadeInUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}

  .blackjack-table{background:radial-gradient(ellipse at center,#0d3d1a 0%,#0a2814 100%);border:3px solid #1a5c2e;border-radius:20px;padding:24px;margin-bottom:16px;text-align:center;box-shadow:inset 0 0 40px rgba(0,0,0,.5),0 8px 24px rgba(0,0,0,.4);position:relative}
  .hand-value{display:inline-block;background:rgba(0,0,0,.5);padding:4px 12px;border-radius:20px;font-size:14px;font-weight:700;color:var(--gold);margin-top:8px}

  .dice-display{display:flex;justify-content:center;gap:20px;margin:24px 0}
  .dice{width:80px;height:80px;background:linear-gradient(135deg,#fff,#f0f0f0);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:48px;font-weight:900;color:#1a1a1a;box-shadow:0 8px 20px rgba(0,0,0,.5),inset 0 -4px 0 rgba(0,0,0,.1);transition:all .3s}
  .dice.rolling{animation:diceRoll .6s ease-out}
  @keyframes diceRoll{0%{transform:rotate(0) scale(1)}25%{transform:rotate(90deg) scale(.8)}50%{transform:rotate(180deg) scale(1.1)}75%{transform:rotate(270deg) scale(.9)}100%{transform:rotate(360deg) scale(1)}}
  .dice-result{text-align:center;font-size:20px;font-weight:800;margin:16px 0;min-height:28px;color:var(--gold)}
  .dice-target{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:12px 0}
  .dice-target-btn{padding:8px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:13px;cursor:pointer;transition:all .2s}
  .dice-target-btn.active{background:var(--gold);color:#000;border-color:var(--gold)}
  .dice-mode{display:flex;gap:8px;margin-bottom:12px}
  .dice-mode-btn{flex:1;padding:10px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
  .dice-mode-btn.active{background:var(--gold);color:#000;border-color:var(--gold)}

  .coinflip-container{text-align:center;margin:24px 0}
  .coin{width:140px;height:140px;margin:0 auto;border-radius:50%;background:radial-gradient(circle at 30% 30%,#f0c84a,#d4af37,#9a7b2a);display:flex;align-items:center;justify-content:center;font-size:64px;font-weight:900;color:#000;box-shadow:0 10px 30px rgba(0,0,0,.5),inset 0 -4px 0 rgba(0,0,0,.2),inset 0 4px 0 rgba(255,255,255,.3);transition:all .3s;position:relative}
  .coin::before{content:'';position:absolute;inset:8px;border-radius:50%;border:3px solid rgba(0,0,0,.2)}
  .coin.flipping{animation:coinFlip 2s ease-out}
  @keyframes coinFlip{0%{transform:rotateY(0) scale(1)}50%{transform:rotateY(1800deg) scale(.8)}100%{transform:rotateY(3600deg) scale(1)}}
  .coinflip-choices{display:flex;gap:12px;justify-content:center;margin:20px 0}
  .coin-choice{flex:1;max-width:140px;padding:16px;background:var(--bg3);border:2px solid var(--border2);border-radius:var(--radius);cursor:pointer;transition:all .2s;text-align:center}
  .coin-choice.selected{border-color:var(--gold);background:rgba(212,175,55,.1);box-shadow:0 0 0 3px rgba(212,175,55,.2)}
  .coin-choice-icon{font-size:36px;margin-bottom:8px}
  .coin-choice-label{font-size:14px;font-weight:700;color:var(--gold)}
  .coinflip-history{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:16px 0}
  .coinflip-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
  .coinflip-badge.heads{background:linear-gradient(135deg,#f0c84a,#d4af37);color:#000}
  .coinflip-badge.tails{background:linear-gradient(135deg,#c0c0c0,#808080);color:#000}

  .podium{display:flex;align-items:flex-end;justify-content:center;gap:8px;margin-bottom:24px}
  .podium-item{flex:1;max-width:110px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:6px}
  .podium-avatar{border-radius:50%;object-fit:cover;border:3px solid;background:var(--bg3)}
  .podium-item.first .podium-avatar{width:70px;height:70px;border-color:var(--gold)}
  .podium-item.second .podium-avatar{width:58px;height:58px;border-color:var(--silver)}
  .podium-item.third .podium-avatar{width:50px;height:50px;border-color:var(--bronze)}
  .podium-block{width:100%;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900}
  .podium-item.first .podium-block{height:80px;background:linear-gradient(to top,#3d2e00,#7a5c00);color:var(--gold)}
  .podium-item.second .podium-block{height:60px;background:linear-gradient(to top,#1a1a1a,#3a3a3a);color:var(--silver)}
  .podium-item.third .podium-block{height:48px;background:linear-gradient(to top,#1a0e06,#3d2108);color:var(--bronze)}
  .podium-name{font-size:11px;font-weight:700;color:var(--text);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .podium-amount{font-size:10px;color:var(--gold)}
  .podium-rank{font-size:16px}

  .leaderboard-row{display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
  .lb-rank{font-size:14px;font-weight:700;color:var(--text3);width:24px;text-align:center}
  .lb-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--bg3)}
  .lb-info{flex:1}
  .lb-name{font-size:14px;font-weight:600;color:var(--text)}
  .lb-user{font-size:11px;color:var(--text3)}
  .lb-amount{font-size:14px;font-weight:700;color:var(--gold)}

  .profile-header{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;display:flex;align-items:center;gap:14px}
  .profile-avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;border:2px solid var(--gold);background:var(--bg3)}
  .profile-name{font-size:18px;font-weight:800;color:var(--gold)}
  .profile-user{font-size:13px;color:var(--text2)}
  .stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;text-align:center}
  .stat-value{font-size:20px;font-weight:800;color:var(--gold)}
  .stat-label{font-size:11px;color:var(--text2);margin-top:3px}
  .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}

  .tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px;overflow-x:auto}
  .tab{padding:10px 14px;font-size:13px;cursor:pointer;color:var(--text3);white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;background:transparent;border-top:none;border-left:none;border-right:none}
  .tab.active{color:var(--gold);border-bottom-color:var(--gold)}
  .tab-content{display:none}
  .tab-content.active{display:block}

  .tx-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
  .tx-row:last-child{border-bottom:none}
  .tx-type{font-size:13px;color:var(--text2)}
  .tx-amount{font-size:14px;font-weight:700}
  .tx-amount.plus{color:#4ade80}
  .tx-amount.minus{color:var(--red)}
  .tx-date{font-size:11px;color:var(--text3);margin-top:2px}

  .market-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .nft-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s}
  .nft-card:active{transform:scale(.98)}
  .nft-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--bg3)}
  .nft-body{padding:10px}
  .nft-name{font-size:13px;font-weight:700;margin-bottom:3px;color:var(--gold)}
  .nft-seller{font-size:11px;color:var(--text3);margin-bottom:8px}
  .nft-price{font-size:14px;font-weight:800;color:var(--gold);margin-bottom:8px}
  .inventory-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}

  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:500;align-items:flex-end;justify-content:center}
  .modal-overlay.active{display:flex}
  .modal{background:var(--bg2);border:1px solid var(--border);border-radius:16px 16px 0 0;width:100%;max-width:480px;padding:20px;max-height:90vh;overflow-y:auto}
  .modal-title{font-size:18px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:8px;color:var(--gold)}
  .modal-tabs{display:flex;gap:0;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;margin-bottom:16px}

<script>
// ════════════════════════════════════════════════════════════════
// КЛИЕНТСКАЯ ЛОГИКА (исправленная)
// ════════════════════════════════════════════════════════════════

const APP_URL = window.location.origin;
const ADMIN_ID = '1631627984';
const TON_RECEIVER_ADDRESS = 'UQCEA1RKJ0eAZ_kvpN7tzhrCIh94XBw9ROSeQbaHPXOEOPRP';

let tg = window.Telegram?.WebApp;
let user = null;

let ws = null;
let wsReady = false;
let currentPage = 'home';
let minesCount = 5;
let minesActive = false;
let rouletteColor = null;
let pokerActive = false;
let rocketHasBet = false;
let rouletteSpinning = false;
let blackjackActive = false;

let toastShowing = false;

// ─── Инициализация ──────────────────────────────────────────────
tg?.expand();
tg?.setHeaderColor('#0a0a0a');
tg?.setBackgroundColor('#0a0a0a');

async function init() {

// ─── API ────────────────────────────────────────────────────────
async function api(path, method = 'GET', body = null) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(APP_URL + path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Ошибка сервера');
  return data;
}

// ─── WebSocket ──────────────────────────────────────────────────
function connectWS() {
  const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(protocol + '//' + APP_URL.replace(/^https?:\/\//, ''));
  ws.onopen = () => {
    wsReady = true;
    if (user) wsSend({ type: 'auth', telegram_id: user.telegram_id });
  };
  ws.onmessage = (e) => {
    try { handleWS(JSON.parse(e.data)); } catch(err) { console.error('WS parse error:', err); }
  };
  ws.onclose = () => {
    wsReady = false;
    setTimeout(connectWS, 3000);
  };
}

function wsSend(data) {
  if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(data));
}

// ─── UI обновления ─────────────────────────────────────────────
function updateUI() {
  document.getElementById('balance-display').textContent = stars;
  document.querySelectorAll('.balance-chip-val').forEach(el => el.textContent = stars);
  if (!user) return;
  document.getElementById('profile-name').textContent = user.first_name || 'Без имени';
  document.getElementById('profile-user').textContent = user.username ? '@' + user.username : '';
  document.getElementById('profile-avatar').src = user.avatar || '';
  document.getElementById('stat-games').textContent = user.games_played || 0;
  document.getElementById('stat-wins').textContent = user.games_won || 0;
  document.getElementById('stat-wager').textContent = user.total_wagered || 0;
  document.getElementById('stat-wr').textContent = (user.games_played > 0 ? Math.round((user.games_won / user.games_played) * 100) : 0) + '%';
  document.getElementById('stat-deposited').textContent = user.total_deposited || 0;
  document.getElementById('stat-withdrawn').textContent = user.total_withdrawn || 0;
  document.getElementById('stat-diff').textContent = (user.total_deposited || 0) - (user.total_withdrawn || 0);
  document.getElementById('stat-balance').textContent = stars;
  document.getElementById('ref-link').textContent = 'https://t.me/DadTonBot?start=' + (user.referral_code || '');
  if (String(user.telegram_id) === ADMIN_ID) document.getElementById('admin-btn-wrap').classList.remove('hidden');
  if (user.wallet_address) document.getElementById('withdraw-addr').value = user.wallet_address;
}

// ─── Обработка WebSocket сообщений ─────────────────────────────
function handleWS(msg) {
  if (msg.type === 'balance_update') { stars = msg.stars; updateUI(); }
  if (msg.type === 'crash_history') renderCrashHistory(msg.history);
  if (msg.type === 'rocket_tick' || msg.type === 'rocket_waiting') handleRocketTick(msg);
  if (msg.type === 'rocket_start') {
    rocketFlying = true;
    document.getElementById('rocket-timer-bar-wrap').classList.add('hidden');
    document.getElementById('rocket-mult-display').classList.remove('crashed');
    document.getElementById('rocket-status').textContent = '🚀 Летим!';
    if (rocketHasBet) document.getElementById('btn-rocket-cashout-wrap').classList.remove('hidden');
  }
  if (msg.type === 'rocket_fly') {
    document.getElementById('rocket-mult-display').textContent = msg.multiplier + 'x';
    document.getElementById('cashout-mult').textContent = msg.multiplier;
    if (msg.bets) renderRocketParticipants(msg.bets);
  }
  if (msg.type === 'rocket_crash') handleRocketCrash(msg);
  if (msg.type === 'rocket_cashout_success' && String(msg.telegram_id) === String(user?.telegram_id)) {
    toast('🎉 +' + msg.winAmount + '⭐ (x' + msg.multiplier + ')', 'green');
    rocketHasBet = false;
    document.getElementById('btn-rocket-cashout-wrap').classList.add('hidden');
  }
  if (msg.type === 'roulette_tick') handleRouletteTick(msg);
  if (msg.type === 'roulette_roll') handleRouletteRoll(msg);
  if (msg.type === 'coinflip_bet') renderCoinflipParticipants(msg);
  if (msg.type === 'coinflip_result') handleCoinflipResult(msg);
  if (msg.type === 'coinflip_win' && String(msg.telegram_id) === String(user?.telegram_id)) {
    toast('🎉 Выигрыш в монетке! +' + msg.win + '⭐', 'green');
  }
  if (msg.type === 'error') toast(msg.message, 'red');
}

// ─── Навигация ──────────────────────────────────────────────────
function showPage(name) {

}

function openGame(name) { showPage(name); }

// ─── Тосты с очередью ───────────────────────────────────────────
function toast(msg, color = 'default') {
  toastQueue.push({ msg, color });
  processToast();
}

function processToast() {
  if (toastShowing || toastQueue.length === 0) return;
  toastShowing = true;
  const { msg, color } = toastQueue.shift();
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = color === 'green' ? '#0d2b1a' : color === 'red' ? '#2b0d0d' : 'var(--bg3)';
  el.style.color = color === 'green' ? '#4ade80' : color === 'red' ? 'var(--red)' : 'var(--gold)';
  el.classList.add('show');
  setTimeout(() => {
    el.classList.remove('show');
    toastShowing = false;
    setTimeout(processToast, 300);
  }, 3000);
}

// ─── Валидация ставок ──────────────────────────────────────────
function validateBet(inputId, min = 10) {
  const el = document.getElementById(inputId);
  const val = parseInt(el.value);
  if (isNaN(val) || val < min) {
    el.value = min;
    toast(`Минимум ${min}⭐`, 'red');
    return false;
  }
  if (val > stars) {
    el.value = stars;
    toast('Недостаточно звёзд', 'red');
    return false;
  }
  return val;
}

function setBet(id, val) { document.getElementById(id).value = val; }

function halfBet(id) { const el = document.getElementById(id); el.value = Math.max(10, Math.floor(parseInt(el.value || 20) / 2)); }
function doubleBet(id) { const el = document.getElementById(id); el.value = Math.min(stars, parseInt(el.value || 10) * 2); }

async function rocketBet() {

// ─── Мины ───────────────────────────────────────────────────────
function selectMines(el, count) {
  document.querySelectorAll('.mines-select-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  minesCount = count;
}

function buildMinesGrid(disabled = false, revealed = [], minePositions = []) {
  const grid = document.getElementById('mines-grid');
  grid.innerHTML = '';
  for (let i = 0; i < 25; i++) {
    const cell = document.createElement('div');
    cell.className = 'mine-cell' + (disabled ? ' disabled' : '');
    cell.dataset.index = i;
    if (minePositions.includes(i)) {
      cell.classList.add('mine');
      cell.textContent = '💣';
    } else if (revealed.includes(i)) {
      cell.classList.add('safe');
      cell.textContent = '⭐';
    } else {
      cell.textContent = '?';
      if (!disabled) cell.onclick = () => openMineCell(i);
    }
    grid.appendChild(cell);
  }
}

  if (!user) return toast('Войдите');
  const btn = document.getElementById('btn-mines-action');

  if (minesActive) {
    try {

async function openMineCell(index) {

  try {
    const r = await api('/api/mines/open', 'POST', { telegram_id: user.telegram_id, cell: index });
    if (r.mine) {
      minesActive = false;
      buildMinesGrid(true, [], r.minePositions);

      document.getElementById('mines-mult').classList.add('hidden');
      toast('💣 Мина!', 'red');

      buildMinesGrid(false, r.revealed);
      document.getElementById('mines-mult').textContent = 'x' + r.multiplier;
      document.getElementById('btn-mines-action').textContent = '💰 Забрать (' + r.multiplier + 'x)';

  } catch (e) {
    toast(e.message, 'red');
  }
}

// ─── Рулетка ────────────────────────────────────────────────────
function buildRouletteWheel() {
  const slots = [];
  for (let i = 0; i < 30; i++) {
    if (i === 0 || i === 15) slots.push('green');
    else if (i % 2 === 0) slots.push('red');
    else slots.push('blue');
  }
  const seg = document.getElementById('roulette-segments');
  seg.innerHTML = '';
  const cx = 140, cy = 140, r = 135;
  slots.forEach((color, i) => {
    const a1 = (i / 30) * 2 * Math.PI - Math.PI / 2;
    const a2 = ((i + 1) / 30) * 2 * Math.PI - Math.PI / 2;
    const fill = color === 'red' ? '#b91c1c' : color === 'blue' ? '#1e40af' : '#15803d';
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${cx},${cy} L${cx + r * Math.cos(a1)},${cy + r * Math.sin(a1)} A${r},${r} 0 0,1 ${cx + r * Math.cos(a2)},${cy + r * Math.sin(a2)} Z`);
    path.setAttribute('fill', fill);
    path.setAttribute('stroke', '#333');
    path.setAttribute('stroke-width', '1');
    seg.appendChild(path);
  });
}

function handleRouletteTick(msg) {
  document.getElementById('roulette-timer').textContent = msg.timer;
  document.getElementById('roulette-bank').textContent = msg.bet?.amount || 0;
  document.getElementById('roulette-participants').innerHTML = msg.bet ?
    `<div class="participant-row">
      <img class="p-avatar" src="${msg.bet.avatar || ''}" onerror="this.style.display='none'"/>
      <span class="p-name">${msg.bet.name || 'Игрок'}</span>
      <span class="p-amount">${msg.bet.amount}⭐</span>
      <span style="font-size:12px;color:${msg.bet.color === 'red' ? '#e63946' : msg.bet.color === 'blue' ? '#60a5fa' : '#4ade80'}">●</span>
    </div>`
    : '<div class="text-sm text-center" style="padding:8px">Нет ставок</div>';
}

function handleRouletteRoll(msg) {
  rouletteSpinning = true;
  const wheel = document.getElementById('roulette-wheel-svg');
  const segmentAngle = 360 / 30;
  const targetAngle = msg.winIndex * segmentAngle + segmentAngle / 2;
  const totalRotation = 5 * 360 + (360 - targetAngle);
  wheel.style.transform = 'rotate(' + totalRotation + 'deg)';
  setTimeout(() => {
    rouletteSpinning = false;
    const labels = { red: '🔴 Красный', blue: '🔵 Синий', green: '🟢 Зелёный' };
    const res = document.getElementById('roulette-result');
    res.textContent = labels[msg.winSlot] + (msg.winner && String(msg.winner) === String(user?.telegram_id) ? ' • +' + msg.winAmount + '⭐!' : '');
    res.className = 'roulette-result ' + msg.winSlot;
    if (msg.winner && String(msg.winner) === String(user?.telegram_id)) toast('🎉 +' + msg.winAmount + '⭐', 'green');
  }, 4200);
}

function selectColor(color, el) {
  document.querySelectorAll('.color-bet-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  rouletteColor = color;
}

function rouletteBet() {
  if (!user) return toast('Войдите');
  if (!rouletteColor) return toast('Выбери цвет', 'red');
  if (rouletteSpinning) return toast('Подождите', 'red');

  const amount = parseInt(document.getElementById('roulette-bet').value);
  if (amount < 10) return toast('Минимум 10⭐', 'red');
  if (amount > stars) return toast('Недостаточно звёзд', 'red');

  wsSend({
    type: 'roulette_bet',
    telegram_id: user.telegram_id,
    name: user.first_name,
    avatar: user.avatar,
    amount,
    color: rouletteColor
  });
}

function rouletteCancel() {
  wsSend({ type: 'cancel_roulette_bet', telegram_id: user?.telegram_id });
}

// ─── Покер ──────────────────────────────────────────────────────
function makeCardHTML(card, size = '', delay = 0) {
  if (!card || card.hidden) {
    return `<div class="playing-card hidden ${size} deal" style="animation-delay:${delay}s">?</div>`;
  }
  return `<div class="playing-card ${size} ${['♥','♦'].includes(card.s) ? 'red-suit' : 'black-suit'} deal" style="animation-delay:${delay}s">
    <div class="card-rank">${card.r}</div>
    <div class="card-suit">${card.s}</div>
  </div>`;

function selectDiceMode(mode, el) {
  document.querySelectorAll('.dice-mode-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  diceMode = mode;
  updateDiceMultiplier();
}

function selectDiceTarget(target, el) {
  document.querySelectorAll('.dice-target-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  diceTarget = target;
  updateDiceMultiplier();
}

function updateDiceMultiplier() {
  const probability = diceMode === 'over' ? (6 - diceTarget) / 6 : (diceTarget - 1) / 6;
  const multiplier = probability > 0 ? (0.95 / probability).toFixed(2) : 0;
  document.getElementById('dice-mult').textContent = 'x' + multiplier;
}

async function diceRoll() {
  if (!user) return toast('Войдите');
  const bet = validateBet('dice-bet');
  if (!bet) return;

  const diceEl = document.getElementById('dice-display');
  diceEl.classList.add('rolling');
  document.getElementById('btn-dice-roll').disabled = true;

  try {
    const r = await api('/api/dice/roll', 'POST', {
      telegram_id: user.telegram_id,
      bet,
      target: diceTarget,
      over_under: diceMode
    });
    setTimeout(() => {
      diceEl.classList.remove('rolling');
      const diceFaces = ['⚀', '⚁', '⚂', '⚃', '⚄', '⚅'];
      diceEl.textContent = diceFaces[r.result - 1];
      const resultEl = document.getElementById('dice-result');
      if (r.won) {
        resultEl.innerHTML = `<span style="color:#4ade80">🎉 Выпало ${r.result}! Выигрыш +${r.win}⭐ (x${r.multiplier})</span>`;
        toast('🎉 +' + r.win + '⭐', 'green');
      } else {
        resultEl.innerHTML = `<span style="color:var(--red)">😔 Выпало ${r.result}. Проигрыш</span>`;
      }
      document.getElementById('btn-dice-roll').disabled = false;
    }, 600);
  } catch (e) {
    diceEl.classList.remove('rolling');
    document.getElementById('btn-dice-roll').disabled = false;
    toast(e.message, 'red');
  }
}

async function createTonTransaction() {
  if (!user) return toast('Войдите');
  if (!tonConnectUI) return toast('Кошелёк не подключен', 'red');

  const amount = parseFloat(document.getElementById('deposit-ton-amount').value);
  if (!amount || amount <= 0) return toast('Укажи сумму', 'red');

  const starsAmount = Math.floor(amount * 100);

  try {
    document.getElementById('ton-tx-info').classList.remove('hidden');

    const tx = {
      validUntil: Math.floor(Date.now() / 1000) + 600,
      messages: [{
        address: TON_RECEIVER_ADDRESS,
        amount: Math.floor(amount * 1000000000).toString(),
        payload: btoa('deposit:' + user.telegram_id + ':' + starsAmount)
      }]
    };

    const result = await tonConnectUI.sendTransaction(tx);

    await api('/api/deposit/ton', 'POST', {
      telegram_id: user.telegram_id,
      amount_gram: amount,
      tx_hash: result
    });

    toast('✅ Транзакция отправлена! Ожидайте подтверждения', 'green');
    closeModal('modal-deposit');
    document.getElementById('ton-tx-info').classList.add('hidden');
  } catch (e) {
    console.error('Transaction error:', e);
    document.getElementById('ton-tx-info').classList.add('hidden');
    if (e.message?.includes('User denied')) {
      toast('Транзакция отменена', 'red');
    } else {
      toast('Ошибка транзакции: ' + (e.message || 'Неизвестная ошибка'), 'red');
    }
  }
}

    });
    const data = await r.json();
    const el = document.getElementById('admin-pending-deposits');
    if (!data.length) {
      el.innerHTML = '<div class="text-sm">Нет ожидающих</div>';
      return;
    }
    el.innerHTML = data.map(d =>
      `<div style="background:var(--bg4);border-radius:8px;padding:10px;margin-bottom:6px">
        <div>${d.first_name || d.username} | ${d.amount_gram}TON (${d.amount_stars}⭐)</div>
        <div style="font-size:11px">TX: ${d.tx_hash || 'N/A'}</div>
        <button class="btn btn-gold btn-sm btn-full mt8" onclick="approveDeposit(${d.id})">✅ Подтвердить</button>
      </div>`
    ).join('');
  } catch (e) {
    console.error(e);
  }
}

async function approveWithdrawal(id) {
  await fetch(APP_URL + '/api/admin/withdrawal/' + id + '/approve', {
    method: 'POST',
    headers: { 'x-admin-id': user.telegram_id }
  });
  toast('✅', 'green');
  loadWithdrawals();
}

async function rejectWithdrawal(id) {
  await fetch(APP_URL + '/api/admin/withdrawal/' + id + '/reject', {
    method: 'POST',
    headers: { 'x-admin-id': user.telegram_id }
  });
  toast('❌ Отклонено');
  loadWithdrawals();
}

async function approveDeposit(id) {
  try {
    await fetch(APP_URL + '/api/approve-deposit/' + id, {
      method: 'POST',
      headers: { 'x-admin-id': user.telegram_id }
    });
    toast('✅', 'green');
    loadPendingDeposits();
  } catch (e) {
    toast(e.message, 'red');
  }
}

// ─── TonConnect ─────────────────────────────────────────────────
async function initTonConnect() {
  try {
    tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
      manifestUrl: APP_URL + '/tonconnect-manifest.json',
      buttonRootId: null
    });
    window.tonConnectUI = tonConnectUI;

    document.getElementById('btn-connect').onclick = () => tonConnectUI.openModal();

    tonConnectUI.onStatusChange(async (wallet) => {
      const btn = document.getElementById('btn-connect');
      if (wallet) {
        const addr = wallet.account.address;
        btn.textContent = '💎 ' + addr.slice(0, 4) + '...' + addr.slice(-4);
        document.getElementById('withdraw-addr').value = addr;
        if (user?.telegram_id) {
          try {
            await api('/api/update-wallet', 'POST', {
              telegram_id: user.telegram_id,
              wallet_address: addr
            });
            user.wallet_address = addr;
          } catch (e) {}
        }
      } else {
        btn.textContent = '💎 Кошелёк';
      }
    });
  } catch (e) {
    console.error('TonConnect error:', e);
    document.getElementById('btn-connect').onclick = () => toast('TonConnect недоступен');
  }
}
