<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DadTon Casino</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        body { background-color: #0A1128; color: #ffffff; font-family: sans-serif; overflow: hidden; }
        .glass { background: rgba(30, 58, 138, 0.25); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        .pulsate { animation: pulse 1.2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        .active-tab { color: #3B82F6; border-top: 2px solid #3B82F6; }
    </style>
</head>
<body class="flex flex-col h-screen justify-between p-1 select-none">

    <header class="glass flex justify-between items-center px-3 py-1.5 rounded-xl text-xs">
        <div class="font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500 text-sm">🎲 DADTON</div>
        <div class="flex items-center gap-2">
            <div id="ton-connect-btn-container" class="scale-90"></div>
            <div onclick="openModal('deposit')" class="flex items-center gap-1 bg-yellow-500/20 text-yellow-400 px-2 py-0.5 rounded-md font-bold cursor-pointer">
                ⭐ <span id="user-balance">0</span>
            </div>
        </div>
    </header>

    <main id="viewport" class="flex-grow my-1 relative overflow-y-auto pr-0.5 text-xs">
        
        <section id="view-games" class="space-y-1.5">
            <div class="glass p-2 rounded-xl">
                <div class="relative h-28 bg-slate-950/60 rounded-lg overflow-hidden flex flex-col justify-center items-center">
                    <div id="rocket-timer" class="absolute top-1 text-gray-400 text-[10px]">ОЖИДАНИЕ СТАРТА...</div>
                    <div id="rocket-mult" class="text-3xl font-black text-blue-400">1.00x</div>
                    <div id="rocket-bar" class="absolute bottom-0 left-0 h-1 bg-blue-500 w-full transition-all duration-100"></div>
                </div>
                <div class="flex gap-1 mt-1">
                    <input id="rocket-amount" type="number" value="10" class="bg-black/40 rounded px-1.5 w-16 text-center text-yellow-400 border border-white/5">
                    <button onclick="setBet('rocket', 10)" class="bg-white/10 px-1.5 rounded">MIN</button>
                    <button onclick="setBet('rocket', 'max')" class="bg-white/10 px-1.5 rounded">MAX</button>
                    <button id="btn-rocket-action" onclick="placeRocketBet()" class="flex-grow bg-gradient-to-r from-yellow-500 to-amber-600 text-black font-black py-1 rounded shadow-lg transition active:scale-95">💰 Ставка</button>
                </div>
            </div>

            <div class="glass p-2 rounded-xl">
                <div class="grid grid-cols-5 gap-1 max-w-[210px] mx-auto" id="mines-grid">
                    </div>
                <div class="flex justify-between items-center mt-1.5 gap-1">
                    <select id="mines-count" class="bg-black/50 text-white rounded p-0.5 text-[11px]">
                        <option value="5">5 Мин</option>
                        <option value="10">10 Мин</option>
                        <option value="15">15 Мин</option>
                    </select>
                    <button id="btn-mines-start" onclick="startMines()" class="flex-grow bg-blue-600 text-white font-bold py-0.5 rounded">💣 Новая игра</button>
                    <button id="btn-mines-cashout" onclick="cashoutMines()" class="hidden flex-grow bg-green-600 text-white font-bold py-0.5 rounded pulsate">💰 Забрать</button>
                </div>
            </div>
        </section>

        <section id="view-shop" class="hidden grid grid-cols-2 gap-1.5 p-0.5">
            </section>

        <section id="view-leaders" class="hidden space-y-1">
            <div class="flex justify-center items-end gap-2 pt-4 pb-2 bg-slate-950/40 rounded-xl">
                <div class="w-16 bg-gradient-to-t from-slate-700 to-slate-400 h-10 rounded-t text-center text-[10px]">#2 <br><span id="top2">...</span></div>
                <div class="w-20 bg-gradient-to-t from-yellow-600 to-yellow-400 h-14 rounded-t text-center text-xs font-bold text-black">#1 <br><span id="top1">...</span></div>
                <div class="w-16 bg-gradient-to-t from-amber-700 to-amber-900 h-8 rounded-t text-center text-[10px]">#3 <br><span id="top3">...</span></div>
            </div>
            <div id="leaders-list" class="space-y-0.5 mt-1"></div>
        </section>

        <section id="view-profile" class="hidden space-y-1.5">
            <div class="glass p-2 rounded-xl flex items-center justify-between">
                <div>
                    <div id="prof-name" class="font-bold text-sm">Игрок</div>
                    <div id="prof-id" class="text-[10px] text-gray-400">ID: ---</div>
                </div>
                <button onclick="openModal('withdraw')" class="bg-red-500/20 text-red-400 px-2 py-0.5 rounded text-[11px]">💸 Вывод</button>
            </div>
            <div class="grid grid-cols-2 gap-1 text-[11px]">
                <div class="glass p-1.5 rounded-lg text-center">🎮 Игр: <span id="stat-games">0</span></div>
                <div class="glass p-1.5 rounded-lg text-center">🏆 Побед: <span id="stat-wins">0</span></div>
            </div>
            <div class="glass p-2 rounded-xl">
                <p class="text-gray-400 text-[10px]">Пригласи друга и получай 5% от его оборота!</p>
                <div class="flex items-center gap-1 mt-1">
                    <input id="ref-link" readonly type="text" value="https://t.me/dadtonbot?start=ref" class="bg-black/40 p-1 rounded text-[10px] flex-grow text-blue-400">
                    <button onclick="navigator.clipboard.writeText(document.getElementById('ref-link').value)" class="bg-blue-600 text-white p-1 rounded text-[10px]">📋</button>
                </div>
            </div>
        </section>
    </main>

    <div id="modal-container" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
        <div class="glass w-full max-w-xs p-3 rounded-2xl space-y-2">
            <h3 id="modal-title" class="font-bold text-center">Оплата</h3>
            <div id="modal-body"></div>
            <button onclick="closeModal()" class="w-full bg-white/10 py-1 rounded text-xs">Отмена</button>
        </div>
    </div>

    <div id="toast-box" class="fixed top-12 left-1/2 -translate-x-1/2 z-50 text-[11px] px-3 py-1.5 rounded-xl hidden shadow-xl font-bold"></div>

    <nav class="glass flex justify-around items-center py-1 rounded-xl text-[10px] text-gray-400">
        <button onclick="switchTab('games')" class="flex flex-col items-center w-1/4 active-tab pt-1" id="tab-games"><span>🏠</span>Главная</button>
        <button onclick="switchTab('shop')" class="flex flex-col items-center w-1/4 pt-1" id="tab-shop"><span>🎁</span>Магазин</button>
        <button onclick="switchTab('leaders')" class="flex flex-col items-center w-1/4 pt-1" id="tab-leaders"><span>🏆</span>Лидеры</button>
        <button onclick="switchTab('profile')" class="flex flex-col items-center w-1/4 pt-1" id="tab-profile"><span>👤</span>Профиль</button>
    </nav>

    <script>
        const tg = window.Telegram?.WebApp;
        if(tg) { tg.expand(); tg.ready(); }

        const userId = tg?.initDataUnsafe?.user?.id || 1631627984; // Фоллбэк на ваш ID для тестов
        const username = tg?.initDataUnsafe?.user?.username || "Игрок";
        const startParam = tg?.initDataUnsafe?.start_param || "";

        let userBalance = 0;
        const ws = new WebSocket(`wss://${location.host}`);

        // Регистрация на сервере
        fetch('/api/register', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: userId, username, ref: startParam })
        }).then(res => res.json()).then(data => updateUserData(data));

        function updateUserData(data) {
            if(!data) return;
            userBalance = data.balance;
            document.getElementById('user-balance').innerText = Math.floor(userBalance);
            document.getElementById('prof-name').innerText = data.username || 'Игрок';
            document.getElementById('prof-id').innerText = `ID: ${data.id}`;
            document.getElementById('stat-games').innerText = data.games_count || 0;
            document.getElementById('stat-wins').innerText = data.wins_count || 0;
            document.getElementById('ref-link').value = `https://t.me/dadtonbot?start=ref_${data.id}`;
        }

        // Вкладки
        function switchTab(tab) {
            ['games', 'shop', 'leaders', 'profile'].forEach(t => {
                document.getElementById(`view-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).classList.remove('active-tab');
            });
            document.getElementById(`view-${tab}`).classList.remove('hidden');
            document.getElementById(`tab-${tab}`).classList.add('active-tab');
            if(tab === 'leaders') loadLeaderboard();
        }

        // Уведомления
        function showToast(text, type = 'success') {
            const box = document.getElementById('toast-box');
            box.innerText = text;
            box.style.backgroundColor = type === 'success' ? '#FFD700' : '#ff4444';
            box.style.color = type === 'success' ? '#000000' : '#ffffff';
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 2500);
        }

        // ИГРА: МИНЫ LOGIC
        function initMinesGrid() {
            const grid = document.getElementById('mines-grid');
            grid.innerHTML = '';
            for(let i=0; i<25; i++) {
                grid.innerHTML += `<div onclick="revealMine(${i})" id="mine-${i}" class="h-8 w-8 bg-slate-800 rounded-lg flex items-center justify-center text-sm font-bold cursor-pointer border border-white/5">?</div>`;
            }
        }
        initMinesGrid();

        function startMines() {
            const bet = 100; // Фиксировано для примера или брать из инпута
            const count = document.getElementById('mines-count').value;
            fetch('/api/games/mines/start', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, bet, minesCount: count })
            }).then(res => res.json()).then(res => {
                if(res.error) return showToast(res.error, 'error');
                initMinesGrid();
                document.getElementById('btn-mines-start').classList.add('hidden');
                document.getElementById('btn-mines-cashout').classList.remove('hidden');
                showToast('Игра началась!');
            });
        }

        function revealMine(idx) {
            fetch('/api/games/mines/reveal', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId, index: idx })
            }).then(res => res.json()).then(res => {
                const cell = document.getElementById(`mine-${idx}`);
                if(res.status === 'safe') {
                    cell.innerText = '⭐';
                    cell.className = "h-8 w-8 bg-green-600 rounded-lg flex items-center justify-center text-sm font-bold text-white";
                    document.getElementById('btn-mines-cashout').innerText = `Забрать (${res.multiplier}x)`;
                } else if(res.status === 'lose') {
                    showToast('💣 Бабах! Вы проиграли.', 'error');
                    document.getElementById('btn-mines-start').classList.remove('hidden');
                    document.getElementById('btn-mines-cashout').classList.add('hidden');
                    initMinesGrid();
                }
            });
        }

        function cashoutMines() {
            fetch('/api/games/mines/cashout', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ userId })
            }).then(res => res.json()).then(res => {
                if(res.success) {
                    showToast(`Вы выиграли ${res.win}⭐!`);
                    document.getElementById('btn-mines-start').classList.remove('hidden');
                    document.getElementById('btn-mines-cashout').classList.add('hidden');
                }
            });
        }

        // Обработка циклов реального времени (WebSockets)
        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if(msg.type === 'rocket_tick') {
                document.getElementById('rocket-timer').innerText = `СТАРТ ЧЕРЕЗ: ${msg.timer}с`;
                document.getElementById('rocket-mult').className = "text-3xl font-black text-gray-500";
            }
            if(msg.type === 'rocket_start' || msg.type === 'rocket_fly') {
                document.getElementById('rocket-timer').innerText = `РАКЕТА В ПОЛЕТЕ`;
                const mDisplay = document.getElementById('rocket-mult');
                mDisplay.innerText = `${msg.multiplier || '1.00'}x`;
                mDisplay.className = "text-3xl font-black text-green-400 scale-105 transition-all";
            }
            if(msg.type === 'rocket_crash') {
                const mDisplay = document.getElementById('rocket-mult');
                mDisplay.innerText = `CRAASH ${msg.multiplier}x`;
                mDisplay.className = "text-3xl font-black text-red-500";
            }
        };

        function loadLeaderboard() {
            fetch('/api/leaderboard').then(res => res.json()).then(data => {
                if(data[0]) document.getElementById('top1').innerText = data[0].username;
                if(data[1]) document.getElementById('top2').innerText = data[1].username;
                if(data[2]) document.getElementById('top3').innerText = data[2].username;
                
                const list = document.getElementById('leaders-list');
                list.innerHTML = '';
                data.slice(3).forEach((user, i) => {
                    list.innerHTML += `<div class="glass flex justify-between p-1.5 rounded-lg text-[11px]"><span>#${i+4} ${user.username}</span><span class="text-yellow-400">${Math.floor(user.total_turnover)}⭐</span></div>`;
                });
            });
        }

        // TON Connect UI Инициализация
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://dadton-full.onrender.com/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-btn-container'
        });
    </script>
</body>
</html>
